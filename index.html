<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakuria</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<nav class="bottom-nav">

    <a href="#" class="active">
        <i class="fa-solid fa-house"></i>
    </a>

    <a href="#">
        <i class="fa-solid fa-plus"></i>
    </a>

    <a href="#">
        <i class="fa-regular fa-message"></i>
    </a>

    <a href="#">
        <i class="fa-regular fa-heart"></i>
    </a>

    <a href="#">
        <i class="fa-regular fa-user"></i>
    </a>

</nav>
    
<header>

    <div class="top-bar">

        <h1>Sakuria</h1>

        <button class="notif-btn">
            <i class="fa-regular fa-bell"></i>
        </button>

    </div>

    <input
        type="search"
        placeholder="Rechercher..."
    >

</header>

<main>

<section class="hero">

<img src="VEGA_1783607160252.jpg" alt="Bannière Sakuria">

</section>

<section class="stories">

    <div class="story add-story">
        <div class="story-circle">+</div>
        <p>Vous</p>
    </div>

</section>

<section class="post">

    <div class="post-header">

        <div class="profile-pic">
    <img src="default-profile.png" alt="Photo de profil">
</div>

        <div class="post-info">
            <strong>Vous</strong>
            <p>À l'instant</p>
        </div>

    </div>

    <div class="post-image">
        Votre première publication 🌸
    </div>

    <div class="post-actions">

    <i class="fa-regular fa-heart"></i>

    <i class="fa-regular fa-comment"></i>

    <i class="fa-solid fa-paper-plane"></i>

    <i class="fa-regular fa-bookmark bookmark"></i>

</div>
    <div class="post-content">
        Bienvenue sur <strong>Sakuria</strong> 💖
    </div>

</section>

</main>

<script src="script.js"></script>

</body>
</html>
